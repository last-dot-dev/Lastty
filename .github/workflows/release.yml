name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and version
        id: resolve
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          pkg_version=$(jq -r '.version' package.json)
          if [ "$version" != "$pkg_version" ]; then
            echo "::error::tag version ($version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.os }})
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.validate-tag.outputs.tag }}
          releaseName: 'Lastty ${{ needs.validate-tag.outputs.version }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false

  publish-release:
    name: publish-release
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ needs.validate-tag.outputs.tag }} --strip header --current

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/sigs
          gh release download "$TAG" --pattern '*.app.tar.gz.sig' --dir /tmp/sigs
          sig_file=$(ls /tmp/sigs/*.app.tar.gz.sig | head -n1)
          signature=$(cat "$sig_file")
          bundle_name="Lastty_${VERSION}_aarch64.app.tar.gz"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg pub_date "$pub_date" \
            --arg signature "$signature" \
            --arg bundle "$bundle_name" \
            '{
              version: $version,
              notes: ("See the release notes at https://github.com/last-dot-dev/Lastty/releases/tag/" + $tag),
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: ("https://github.com/last-dot-dev/Lastty/releases/download/" + $tag + "/" + $bundle)
                }
              }
            }' > latest.json
          gh release upload "$TAG" latest.json --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          gh release edit "${{ needs.validate-tag.outputs.tag }}" \
            --notes "$CHANGELOG" \
            --draft=false
