[package]
name = "lastty"
version = "0.1.0"
edition = "2021"
default-run = "lastty"

[lib]
name = "lastty"
path = "src/lib.rs"

[[bin]]
name = "lastty"
path = "src/main.rs"

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "test"] }
tauri-build = { version = "2", features = [] }
alacritty_terminal = "0.26"
wgpu = "29"
swash = "0.2"
etagere = "0.3"
fontdb = "0.23"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
dashmap = "6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
raw-window-handle = "0.6"
pane-protocol = { path = "../pane-protocol" }
bytemuck = { version = "1", features = ["derive"] }
toml = "0.8"
polling = "3"
pollster = "0.4"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSArray", "NSGeometry", "NSObject"] }
objc2-app-kit = { version = "0.3", features = ["NSView", "NSWindow", "NSResponder", "objc2-quartz-core"] }
objc2-quartz-core = { version = "0.3", features = ["CALayer"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
